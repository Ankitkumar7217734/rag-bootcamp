<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Bootcamp</title>
    <!-- Syntax highlighting theme (IDE-style code colors) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="style.css?v=28">
</head>
<body>
    <!-- Top header bar -->
    <header class="topbar">
        <!-- Hamburger — opens/closes the sidebar on every screen size -->
        <button class="sidebar-toggle" id="sidebar-toggle" type="button"
                aria-label="Toggle navigation" aria-controls="sidebar" aria-expanded="true">
            <span></span><span></span><span></span>
        </button>
        <!-- Brand text doubles as the "go home" button -->
        <a class="topbar-brand" href="#">
            <span class="topbar-logo"></span>
            <span class="topbar-title">RAG Bootcamp</span>
            <span class="topbar-tag">Docs</span>
        </a>
    </header>

    <div class="layout">
        <!-- Sidebar (auto-generated from chapters.js) -->
        <aside class="sidebar" id="sidebar">
            <nav class="sidebar-inner">
                <button class="sidebar-close" id="sidebar-close" type="button" aria-label="Close navigation">&times;</button>
                <p class="sidebar-label">Documentation</p>
                <ul class="sidebar-nav" id="sidebar-nav"></ul>
            </nav>
        </aside>

        <!-- Sidebar open/close handle — an arrow that rides the sidebar's right
             edge and stays visible when collapsed so it can reopen it (desktop). -->
        <button class="sidebar-handle" id="sidebar-handle" type="button"
                aria-label="Close sidebar" aria-controls="sidebar" aria-expanded="true">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
                <path d="M15 6l-6 6 6 6" fill="none" stroke="currentColor"
                      stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <!-- Backdrop for mobile sidebar -->
        <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

        <!-- Main content area -->
        <main class="main">
            <div class="content-wrapper">
                <!-- Article (loaded dynamically) -->
                <article class="content" id="main-content"></article>

                <!-- "On this page" table of contents (auto-generated) -->
                <aside class="toc" id="toc" aria-label="On this page"></aside>
            </div>
        </main>
    </div>

    <script src="chapters.js?v=28"></script>
    <!-- highlight.js core (bundles common languages: python, json, sql, js, bash…) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js?v=28"></script>
</body>
</html>
